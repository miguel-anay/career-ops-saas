name: Test

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go tests
        run: cd api && go test ./... -count=1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            worker/package-lock.json
            web/package-lock.json

      - name: Worker tests
        run: cd worker && npm ci && npm test

      - name: Web tests
        run: cd web && npm ci && npm test -- --run

  rls-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: careerops
          POSTGRES_PASSWORD: careerops
          POSTGRES_DB: careerops
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install pgTAP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client pgtap

      - name: Apply schema + RLS
        run: |
          PGPASSWORD=careerops psql -h localhost -U careerops -d careerops -f db/migrations/001_initial.sql

      - name: Run pgTAP RLS tests
        run: |
          PGPASSWORD=careerops pg_prove -h localhost -U careerops -d careerops db/tests/rls_test.sql
