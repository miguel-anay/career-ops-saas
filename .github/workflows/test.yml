name: Test

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go tests
        run: cd api && go test ./... -count=1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            worker/package-lock.json
            web/package-lock.json

      - name: Worker tests
        run: cd worker && npm ci && npm test

      - name: Web tests
        run: cd web && npm ci && npm test -- --run

  rls-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `make test-rls` manages its own postgres via docker compose, installs
      # pgTAP INSIDE the postgres container (the extension must live in the
      # server, not on the runner host), applies migrations, and runs the
      # pgTAP suites as app_user — superusers bypass RLS, so running as the
      # superuser would be a false positive. Delegating to the Makefile keeps
      # CI identical to local `make test-rls`.
      - name: Run RLS pgTAP tests
        run: make test-rls
