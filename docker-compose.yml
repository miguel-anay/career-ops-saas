services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: careerops
      POSTGRES_PASSWORD: careerops
      POSTGRES_DB: careerops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
      - ./db/tests:/db/tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerops"]
      interval: 5s
      retries: 10
    # T-78: healthcheck ordering verified

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app_user:app_pw@postgres:5432/careerops?sslmode=disable
      JWT_SECRET: dev-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: http://localhost:8080/auth/google/callback
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: careerops-pdfs
      WEB_ORIGIN: http://localhost:3000
      PORT: "8080"
    ports:
      - "8080:8080"

  worker:
    build: ./worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app_user:app_pw@postgres:5432/careerops?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: claude-sonnet-4-6
      # Evaluator provider: anthropic (default) | qwen | deepseek | minimax | openai
      EVALUATOR: ${EVALUATOR:-anthropic}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_BASE_URL: ${LLM_BASE_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: careerops-pdfs
      SERPER_API_KEY: ${SERPER_API_KEY}
      WORKER_PORT: "3001"
    ports:
      - "3001:3001"
    shm_size: "1gb"

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"

volumes:
  pgdata:
